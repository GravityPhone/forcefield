<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forcefield Demo Studio</title>
<style>
  :root {
    --bg: #0e1216;
    --panel: #171d24;
    --panel-2: #1e2630;
    --line: #2a3441;
    --ink: #e8edf2;
    --dim: #8b98a5;
    --accent: #ff7a1a;
    --accent-ink: #1a0e02;
    --good: #4cc38a;
    --bad: #e5534b;
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  button {
    font: inherit; color: var(--ink); background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 14px; cursor: pointer;
  }
  button:hover { border-color: var(--dim); }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }
  button.danger { color: var(--bad); }
  button:disabled { opacity: .45; cursor: default; }
  input[type=text], input[type=number], textarea {
    font: inherit; color: var(--ink); background: var(--bg);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 9px;
  }
  textarea { width: 100%; resize: vertical; line-height: 1.6; }
  audio, video { display: block; border-radius: 6px; background: #000; }
  .pill {
    display: inline-block; font-size: 11.5px; padding: 2px 9px; border-radius: 99px;
    border: 1px solid var(--line); color: var(--dim);
  }
  .pill.ok { color: var(--good); border-color: var(--good); }
  .pill.err { color: var(--bad); border-color: var(--bad); }

  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 18px; border-bottom: 1px solid var(--line); background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: -.01em; }
  header h1 span { color: var(--accent); }
  header .spacer { flex: 1; }
  header .stat { font-family: var(--mono); font-size: 12.5px; color: var(--dim); }
  header .stat b { color: var(--ink); }

  .layout { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 55px); }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  nav.rail { border-right: 1px solid var(--line); background: var(--panel); padding: 10px; }
  .seg-item {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    background: none; border: 1px solid transparent; padding: 9px 10px; margin-bottom: 2px;
  }
  .seg-item:hover { background: var(--panel-2); }
  .seg-item.active { background: var(--panel-2); border-color: var(--line); }
  .seg-item .t { flex: 1; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); flex-shrink: 0; }
  .dot.on { background: var(--good); }
  .dot-label { font-size: 10px; color: var(--dim); margin-right: -5px; }
  .rail-foot { margin-top: 14px; padding: 12px 10px; border-top: 1px solid var(--line); font-size: 12px; color: var(--dim); }

  main { padding: 20px 24px 80px; max-width: 860px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 16px;
  }
  .card h3 { margin: 0 0 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); }
  .card .sub { font-size: 12.5px; color: var(--dim); margin: 0 0 12px; }
  .hint { font-size: 13px; color: var(--dim); margin: 4px 0 18px; max-width: 64ch; }
  h2.seg-title { margin: 0; font-size: 22px; }

  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .take {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 0; border-top: 1px solid var(--line);
  }
  .take:first-of-type { border-top: none; }
  .take .meta { font-family: var(--mono); font-size: 12px; color: var(--dim); min-width: 130px; }
  .take .meta b { color: var(--ink); }
  .take input.note { flex: 1; min-width: 140px; font-size: 12.5px; }
  .take label.sel { display: flex; align-items: center; gap: 6px; font-size: 12.5px; cursor: pointer; }
  .take input[type=radio] { accent-color: var(--accent); }
  .empty { color: var(--dim); font-size: 13px; padding: 6px 0; }

  #prompter {
    position: fixed; inset: 0; z-index: 50; background: #05070a;
    display: none; flex-direction: column; padding: 5vh 8vw;
  }
  #prompter.open { display: flex; }
  #prompter .top { display: flex; align-items: center; gap: 16px; color: var(--dim); }
  #prompter .timer { font-family: var(--mono); font-size: 30px; color: var(--accent); font-variant-numeric: tabular-nums; }
  #prompter ul { list-style: none; margin: auto 0; padding: 0; }
  #prompter li {
    font-size: clamp(22px, 3.4vw, 38px); font-weight: 600; line-height: 1.4;
    padding: 12px 0 12px 26px; color: #55606c; border-left: 5px solid transparent;
    transition: color .2s, border-color .2s;
  }
  #prompter li.now { color: #fff; border-left-color: var(--accent); }
  #prompter li.done { color: #2f3843; }
  #prompter .foot { color: var(--dim); font-size: 14px; }
  #prompter .foot kbd {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 7px; font-family: var(--mono); font-size: 12px;
  }
  #countdown {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    font-size: 18vw; font-weight: 800; color: var(--accent); background: #05070a;
  }
  #countdown.open { display: flex; }

  #recpill {
    position: fixed; right: 18px; bottom: 18px; z-index: 60; display: none;
    align-items: center; gap: 12px; background: var(--panel); border: 1px solid var(--bad);
    border-radius: 99px; padding: 10px 12px 10px 18px; box-shadow: 0 6px 30px rgba(0,0,0,.5);
  }
  #recpill.open { display: flex; }
  #recpill .reddot { width: 10px; height: 10px; border-radius: 50%; background: var(--bad); animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  #recpill .timer { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  .msg { font-size: 13px; margin-top: 10px; white-space: pre-wrap; }
  .msg.err { color: var(--bad); }
  .msg.ok { color: var(--good); }
</style>
</head>
<body>

<header>
  <h1><span>●</span> Forcefield Demo Studio</h1>
  <span class="pill" id="ffpill">checking ffmpeg…</span>
  <div class="spacer"></div>
  <span class="stat">ready <b id="readyCount">0/0</b></span>
  <span class="stat">est. runtime <b id="runtime">0:00</b></span>
  <button class="primary" id="assembleBtn">Assemble final video</button>
</header>

<div class="layout">
  <nav class="rail" id="rail"></nav>
  <main id="main"></main>
</div>

<div id="prompter">
  <div class="top">
    <span class="reddot" style="width:10px;height:10px;border-radius:50%;background:var(--bad)"></span>
    <strong id="prompterTitle"></strong>
    <span class="timer" id="prompterTimer">0:00</span>
    <div class="spacer" style="flex:1"></div>
    <button id="prompterStop">■ Stop &amp; save</button>
  </div>
  <ul id="prompterList"></ul>
  <div class="foot"><kbd>Space</kbd> next talking point &nbsp;·&nbsp; <kbd>Esc</kbd> stop &amp; save. Talking points are an outline — use your own words.</div>
  <div id="countdown"></div>
</div>

<div id="recpill">
  <span class="reddot"></span>
  <span>Recording screen</span>
  <span class="timer" id="recpillTimer">0:00</span>
  <button id="recpillStop">■ Stop</button>
</div>

<script>
let project = null
let currentSegId = null

const $ = (s) => document.querySelector(s)
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
const fmt = (sec) => {
  sec = Math.max(0, Math.round(sec))
  return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0')
}

async function api(pathname, opts) {
  const r = await fetch(pathname, opts)
  const body = await r.json().catch(() => ({}))
  if (!r.ok) throw new Error(body.error || r.statusText)
  return body
}
async function saveProject() {
  project = await api('/api/project', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(project),
  })
  render()
}
const seg = () => project.segments.find((s) => s.id === currentSegId)
const pickMime = (kinds) => kinds.find((k) => MediaRecorder.isTypeSupported(k)) || ''

// ---------- render ----------

function render() {
  renderHeader()
  renderRail()
  renderDetail()
}

function renderHeader() {
  const ready = project.segments.filter((s) => s.selectedAudio && s.selectedVideo).length
  $('#readyCount').textContent = `${ready}/${project.segments.length}`
  let total = 0
  for (const s of project.segments) {
    const a = s.audioTakes.find((t) => t.id === s.selectedAudio)
    if (a) total += a.duration + 0.4
  }
  $('#runtime').textContent = fmt(total)
  $('#assembleBtn').disabled = ready === 0
}

function renderRail() {
  const rail = $('#rail')
  rail.innerHTML = project.segments.map((s) => `
    <button class="seg-item ${s.id === currentSegId ? 'active' : ''}" data-seg="${s.id}">
      <span class="t">${esc(s.title)}</span>
      <span class="dot-label">VO</span><span class="dot ${s.selectedAudio ? 'on' : ''}"></span>
      <span class="dot-label">VID</span><span class="dot ${s.selectedVideo ? 'on' : ''}"></span>
    </button>`).join('') + `
    <div class="rail-foot">
      Green dots = a take is selected for that half. A segment needs both to make the final cut.
      Files live in <code>demo-studio/media/</code>.
    </div>`
  rail.querySelectorAll('.seg-item').forEach((b) =>
    b.addEventListener('click', () => { currentSegId = b.dataset.seg; render() }))
}

function takeRow(s, kind, t) {
  const selected = (kind === 'audio' ? s.selectedAudio : s.selectedVideo) === t.id
  const when = new Date(t.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
  const player = kind === 'audio'
    ? `<audio controls preload="metadata" src="/media/${esc(t.file)}"></audio>`
    : `<video controls preload="metadata" width="260" src="/media/${esc(t.file)}"></video>`
  return `<div class="take">
    <label class="sel"><input type="radio" name="sel-${kind}" data-kind="${kind}" data-id="${t.id}" ${selected ? 'checked' : ''}> use</label>
    <span class="meta"><b>${fmt(t.duration)}</b> · ${when}${kind === 'audio' && t.marks.length > 1 ? ` · ${t.marks.length} marks` : ''}</span>
    ${player}
    <input type="text" class="note" data-kind="${kind}" data-id="${t.id}" placeholder="note (e.g. best one)" value="${esc(t.note)}">
    <button class="danger del" data-kind="${kind}" data-id="${t.id}">✕</button>
  </div>`
}

function renderDetail() {
  const s = seg()
  const main = $('#main')
  if (!s) { main.innerHTML = '<p class="empty">Pick a segment on the left.</p>'; return }

  const musicPlayer = project.music
    ? `<audio controls preload="metadata" src="/media/${esc(project.music)}"></audio>`
    : '<span class="empty">No music yet — MP3 recommended.</span>'

  main.innerHTML = `
    <h2 class="seg-title">${esc(s.title)}</h2>
    <p class="hint">${esc(s.hint)}</p>

    <div class="card">
      <h3>Talking points</h3>
      <p class="sub">One per line. These show huge on the teleprompter — outline, not a script.</p>
      <textarea id="bullets" rows="${Math.max(3, s.bullets.length + 1)}">${esc(s.bullets.join('\n'))}</textarea>
    </div>

    <div class="card">
      <h3>Voiceover takes</h3>
      <p class="sub">Record VO reads the talking points on a full-screen teleprompter. Tap <b>Space</b> as you move to each point — the marks drive graphics timing later.</p>
      <div class="row">
        <button class="primary" id="recVO">● Record VO take</button>
      </div>
      <div id="audioTakes">${s.audioTakes.length ? s.audioTakes.map((t) => takeRow(s, 'audio', t)).join('') : '<p class="empty">No VO takes yet.</p>'}</div>
    </div>

    <div class="card">
      <h3>Video takes (screen capture)</h3>
      <p class="sub">Captures any window you pick — have forcefield.ninja open and sized how you want it filmed. If a VO take is selected, it can play out loud while you record so your driving matches your narration.</p>
      <div class="row">
        <button class="primary" id="recScreen">● Record screen take</button>
        <label class="sel"><input type="checkbox" id="playVO" ${s.selectedAudio ? 'checked' : 'disabled'}> play selected VO while recording</label>
      </div>
      <div id="videoTakes">${s.videoTakes.length ? s.videoTakes.map((t) => takeRow(s, 'video', t)).join('') : '<p class="empty">No video takes yet.</p>'}</div>
    </div>

    <div class="card">
      <h3>Segment preview</h3>
      <p class="sub">Muxes the selected VO + video: trims lead-in silence, normalizes loudness, pads whichever is shorter, adds the corner label.</p>
      <div class="row"><button id="muxBtn" ${s.selectedAudio && s.selectedVideo ? '' : 'disabled'}>Build preview</button></div>
      <div id="muxOut"></div>
    </div>

    <div class="card">
      <h3>Background music (whole video)</h3>
      <p class="sub">Loops under the full cut, auto-ducked whenever you're talking, fades out at the end.</p>
      <div class="row">
        <input type="file" id="musicFile" accept="audio/*">
        ${musicPlayer}
        <label class="sel">volume <input type="number" id="musicVol" min="0" max="1" step="0.02" value="${project.musicVolume}" style="width:70px"></label>
      </div>
    </div>

    <div id="finalOut"></div>
  `

  $('#bullets').addEventListener('blur', () => {
    const lines = $('#bullets').value.split('\n').map((l) => l.trim()).filter(Boolean)
    if (JSON.stringify(lines) !== JSON.stringify(s.bullets)) { s.bullets = lines; saveProject() }
  })
  $('#recVO').addEventListener('click', recordVO)
  $('#recScreen').addEventListener('click', recordScreen)
  $('#muxBtn').addEventListener('click', buildPreview)
  $('#musicFile').addEventListener('change', uploadMusic)
  $('#musicVol').addEventListener('change', () => {
    project.musicVolume = Math.min(1, Math.max(0, parseFloat($('#musicVol').value) || 0.22))
    saveProject()
  })

  main.querySelectorAll('input[type=radio][data-kind]').forEach((r) =>
    r.addEventListener('change', () => {
      if (r.dataset.kind === 'audio') s.selectedAudio = r.dataset.id
      else s.selectedVideo = r.dataset.id
      saveProject()
    }))
  main.querySelectorAll('input.note').forEach((n) =>
    n.addEventListener('change', () => {
      const list = n.dataset.kind === 'audio' ? s.audioTakes : s.videoTakes
      const t = list.find((x) => x.id === n.dataset.id)
      if (t) { t.note = n.value; saveProject() }
    }))
  main.querySelectorAll('button.del').forEach((b) =>
    b.addEventListener('click', () => {
      if (!confirm('Delete this take from the list? (The file stays on disk.)')) return
      const kind = b.dataset.kind
      const list = kind === 'audio' ? s.audioTakes : s.videoTakes
      const i = list.findIndex((x) => x.id === b.dataset.id)
      if (i >= 0) list.splice(i, 1)
      if (kind === 'audio' && s.selectedAudio === b.dataset.id) s.selectedAudio = list.at(-1)?.id ?? null
      if (kind === 'video' && s.selectedVideo === b.dataset.id) s.selectedVideo = list.at(-1)?.id ?? null
      saveProject()
    }))
}

// ---------- VO recording (teleprompter) ----------

let vo = null

async function recordVO() {
  const s = seg()
  let stream
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true })
  } catch (e) { alert('Mic access failed: ' + e.message); return }

  $('#prompterTitle').textContent = s.title
  $('#prompterList').innerHTML = s.bullets.map((b, i) =>
    `<li class="${i === 0 ? 'now' : ''}">${esc(b)}</li>`).join('')
  $('#prompter').classList.add('open')
  document.body.style.overflow = 'hidden'

  // 3-2-1 countdown, then roll
  const cd = $('#countdown')
  cd.classList.add('open')
  for (const n of [3, 2, 1]) {
    cd.textContent = n
    await new Promise((r) => setTimeout(r, 900))
  }
  cd.classList.remove('open')

  const mime = pickMime(['audio/webm;codecs=opus', 'audio/webm'])
  const mr = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined)
  const chunks = []
  mr.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data) }
  vo = { mr, stream, chunks, t0: performance.now(), marks: [0], bullet: 0, done: false }
  mr.onstop = () => finishVO()
  mr.start()

  vo.timer = setInterval(() => {
    $('#prompterTimer').textContent = fmt((performance.now() - vo.t0) / 1000)
  }, 250)
}

function voAdvance() {
  const s = seg()
  if (!vo || vo.bullet >= s.bullets.length - 1) return
  vo.bullet++
  vo.marks.push((performance.now() - vo.t0) / 1000)
  const items = $('#prompterList').children
  for (let i = 0; i < items.length; i++) {
    items[i].className = i < vo.bullet ? 'done' : i === vo.bullet ? 'now' : ''
  }
}

function stopVO() { if (vo && !vo.done) { vo.done = true; vo.mr.stop() } }

async function finishVO() {
  const s = seg()
  clearInterval(vo.timer)
  const duration = (performance.now() - vo.t0) / 1000
  const blob = new Blob(vo.chunks, { type: 'audio/webm' })
  vo.stream.getTracks().forEach((t) => t.stop())
  const marks = vo.marks.map((m) => m.toFixed(2)).join(',')
  $('#prompter').classList.remove('open')
  document.body.style.overflow = ''
  try {
    project = await api(`/api/take?seg=${s.id}&kind=audio&duration=${duration.toFixed(2)}&marks=${marks}`,
      { method: 'POST', body: blob })
  } catch (e) { alert('Upload failed: ' + e.message) }
  vo = null
  render()
}

$('#prompterStop').addEventListener('click', stopVO)
document.addEventListener('keydown', (e) => {
  if (!$('#prompter').classList.contains('open')) return
  if (e.code === 'Space') { e.preventDefault(); voAdvance() }
  if (e.code === 'Escape') { e.preventDefault(); stopVO() }
})

// ---------- screen recording ----------

let scr = null

async function recordScreen() {
  const s = seg()
  let stream
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 60 } }, audio: false,
    })
  } catch (e) { return } // user cancelled the picker

  const mime = pickMime(['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'])
  const mr = new MediaRecorder(stream, {
    ...(mime ? { mimeType: mime } : {}), videoBitsPerSecond: 12_000_000,
  })
  const chunks = []
  mr.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data) }

  let voEl = null
  if ($('#playVO')?.checked && s.selectedAudio) {
    const a = s.audioTakes.find((t) => t.id === s.selectedAudio)
    if (a) { voEl = new Audio('/media/' + a.file); voEl.play() }
  }

  scr = { mr, stream, chunks, t0: performance.now(), voEl, done: false }
  mr.onstop = () => finishScreen()
  stream.getVideoTracks()[0].addEventListener('ended', stopScreen)
  mr.start()

  $('#recpill').classList.add('open')
  scr.timer = setInterval(() => {
    $('#recpillTimer').textContent = fmt((performance.now() - scr.t0) / 1000)
  }, 250)
}

function stopScreen() { if (scr && !scr.done) { scr.done = true; scr.mr.stop() } }

async function finishScreen() {
  const s = seg()
  clearInterval(scr.timer)
  const duration = (performance.now() - scr.t0) / 1000
  const blob = new Blob(scr.chunks, { type: 'video/webm' })
  scr.stream.getTracks().forEach((t) => t.stop())
  if (scr.voEl) scr.voEl.pause()
  $('#recpill').classList.remove('open')
  try {
    project = await api(`/api/take?seg=${s.id}&kind=video&duration=${duration.toFixed(2)}`,
      { method: 'POST', body: blob })
  } catch (e) { alert('Upload failed: ' + e.message) }
  scr = null
  render()
}

$('#recpillStop').addEventListener('click', stopScreen)

// ---------- mux + assemble + music ----------

async function buildPreview() {
  const s = seg()
  const out = $('#muxOut')
  $('#muxBtn').disabled = true
  out.innerHTML = '<p class="msg">Rendering… (10–60s)</p>'
  try {
    const r = await api(`/api/mux?seg=${s.id}`, { method: 'POST' })
    out.innerHTML = `<video controls width="640" src="${r.url}?t=${Date.now()}" style="margin-top:12px"></video>`
  } catch (e) {
    out.innerHTML = `<p class="msg err">${esc(e.message)}</p>`
  }
  $('#muxBtn').disabled = false
}

$('#assembleBtn').addEventListener('click', async () => {
  const btn = $('#assembleBtn')
  btn.disabled = true
  btn.textContent = 'Assembling… (can take minutes)'
  const out = $('#finalOut') || $('#main')
  try {
    const r = await api('/api/assemble', { method: 'POST' })
    out.innerHTML = `<div class="card"><h3>Final cut</h3>
      ${r.skipped.length ? `<p class="msg err">Skipped (missing takes): ${esc(r.skipped.join(', '))}</p>` : ''}
      <video controls width="720" src="${r.url}?t=${Date.now()}"></video>
      <p class="msg ok">Saved to demo-studio/media/final.mp4</p></div>`
    out.scrollIntoView({ behavior: 'smooth' })
  } catch (e) {
    alert('Assembly failed:\n' + e.message)
  }
  btn.disabled = false
  btn.textContent = 'Assemble final video'
})

async function uploadMusic() {
  const f = $('#musicFile').files[0]
  if (!f) return
  try {
    project = await api(`/api/music?name=${encodeURIComponent(f.name)}`, { method: 'POST', body: f })
    render()
  } catch (e) { alert('Upload failed: ' + e.message) }
}

// ---------- boot ----------

;(async () => {
  project = await api('/api/project')
  currentSegId = project.segments[0]?.id ?? null
  render()
  try {
    const st = await api('/api/status')
    const p = $('#ffpill')
    p.textContent = st.ffmpeg ? 'ffmpeg ready' : 'ffmpeg NOT FOUND'
    p.className = 'pill ' + (st.ffmpeg ? 'ok' : 'err')
  } catch { }
})()
</script>
</body>
</html>
