<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:radial-gradient(120% 90% at 50% 80%,#16324b 0%,#0b1622 55%,#070d14 100%);
    display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
  .wrap{text-align:center;animation:in 1.2s cubic-bezier(.22,1,.36,1) both}
  .shield{font-size:56px;margin-bottom:16px}
  h1{color:#fff;font-size:44px;letter-spacing:.12em;margin:0;font-weight:800}
  h1 .f{color:#ff6d00}
  .url{margin-top:26px;color:#fff;font-size:26px;font-weight:700;letter-spacing:.03em;
    background:rgba(255,109,0,.16);border:2px solid #ff6d00;border-radius:999px;
    display:inline-block;padding:12px 30px;animation:pulse 2.2s ease-in-out infinite}
  p{color:#9fb4c8;font-size:16px;margin-top:18px}
  @keyframes in{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,109,0,.35)}50%{box-shadow:0 0 0 14px rgba(255,109,0,0)}}
</style></head><body>
  <div class="wrap">
    <div class="shield">🛡️</div>
    <h1><span class="f">FORCE</span>FIELD</h1>
    <div class="url">forcefield.ninja</div>
    <p>Built for the field. Built for the team.</p>
  </div>
</body></html>
