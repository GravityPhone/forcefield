<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:radial-gradient(120% 90% at 50% 20%,#16324b 0%,#0b1622 55%,#070d14 100%);
    display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
  .wrap{text-align:center;animation:in 1.4s cubic-bezier(.22,1,.36,1) both}
  .shield{font-size:64px;margin-bottom:18px;animation:float 3.2s ease-in-out infinite}
  h1{color:#fff;font-size:54px;letter-spacing:.14em;margin:0;font-weight:800}
  h1 .f{color:#ff6d00}
  p{color:#9fb4c8;font-size:17px;letter-spacing:.04em;margin-top:14px}
  @keyframes in{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style></head><body>
  <div class="wrap">
    <div class="shield">🛡️</div>
    <h1><span class="f">FORCE</span>FIELD</h1>
    <p>Door-to-door canvassing, together.</p>
  </div>
</body></html>
